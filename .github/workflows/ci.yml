name: CI/CD

on:
  push:
    branches: [main, develop]
    tags: ["v*"]
  pull_request:
    branches: [main, develop]

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v3
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Type check
        run: pnpm type-check

      - name: Lint
        run: pnpm lint

      - name: Test
        run: pnpm test
  e2e:
    needs: ci
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v3
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install Playwright browsers
        run: pnpm exec playwright install --with-deps chromium
        working-directory: apps/web

      - name: Build workspace packages
        run: pnpm turbo run build --filter=@satellite-control/web^...

      - name: Build web app
        run: pnpm turbo run build --filter=@satellite-control/web

      - name: Run E2E tests
        run: pnpm exec playwright test
        working-directory: apps/web

      - name: Upload Playwright report
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: apps/web/playwright-report/

  deploy-preview:
    needs: ci
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    permissions:
      pull-requests: write
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v3
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install Vercel CLI
        run: pnpm add -g vercel

      - name: Pull Vercel environment
        run: vercel pull --yes --environment=preview --token=${{ secrets.VERCEL_TOKEN }}
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

      - name: Set public feature flags
        run: |
          sed -i '/^NEXT_PUBLIC_FEATURE_COMMAND_CENTER=/d'   .vercel/.env.preview.local
          sed -i '/^NEXT_PUBLIC_FEATURE_TELEMETRY_TUNNEL=/d' .vercel/.env.preview.local
          sed -i '/^NEXT_PUBLIC_FEATURE_DIGITAL_TWIN=/d'     .vercel/.env.preview.local
          echo "NEXT_PUBLIC_FEATURE_COMMAND_CENTER=true"   >> .vercel/.env.preview.local
          echo "NEXT_PUBLIC_FEATURE_TELEMETRY_TUNNEL=true" >> .vercel/.env.preview.local
          echo "NEXT_PUBLIC_FEATURE_DIGITAL_TWIN=true"     >> .vercel/.env.preview.local

      - name: Build workspace packages
        run: pnpm turbo run build --filter=@satellite-control/web^...

      - name: Build
        run: vercel build --token=${{ secrets.VERCEL_TOKEN }}
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

      - name: Deploy Preview
        id: deploy
        run: |
          url=$(vercel deploy --prebuilt --token=${{ secrets.VERCEL_TOKEN }})
          echo "url=$url" >> $GITHUB_OUTPUT
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

      - name: Comment preview URL
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: '🚀 Preview: ${{ steps.deploy.outputs.url }}'
            })

  merge-to-main:
    needs: ci
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.PAT_NAME }}

      - name: Merge develop into main
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git checkout main
          git merge origin/develop --no-ff -m "chore: merge develop → main (${{ github.ref_name }})"
          git push origin main

  deploy-production:
    needs: merge-to-main
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main

      - uses: pnpm/action-setup@v3
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install Vercel CLI
        run: pnpm add -g vercel

      - name: Pull Vercel environment
        run: vercel pull --yes --environment=production --token=${{ secrets.VERCEL_TOKEN }}
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

      - name: Set public feature flags
        run: |
          sed -i '/^NEXT_PUBLIC_FEATURE_COMMAND_CENTER=/d'   .vercel/.env.production.local
          sed -i '/^NEXT_PUBLIC_FEATURE_TELEMETRY_TUNNEL=/d' .vercel/.env.production.local
          sed -i '/^NEXT_PUBLIC_FEATURE_DIGITAL_TWIN=/d'     .vercel/.env.production.local
          echo "NEXT_PUBLIC_FEATURE_COMMAND_CENTER=true"   >> .vercel/.env.production.local
          echo "NEXT_PUBLIC_FEATURE_TELEMETRY_TUNNEL=true" >> .vercel/.env.production.local
          echo "NEXT_PUBLIC_FEATURE_DIGITAL_TWIN=true"     >> .vercel/.env.production.local

      - name: Build workspace packages
        run: pnpm turbo run build --filter=@satellite-control/web^...

      - name: Build
        run: vercel build --prod --token=${{ secrets.VERCEL_TOKEN }}
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
          SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}

      - name: Deploy Production
        run: vercel deploy --prebuilt --prod --token=${{ secrets.VERCEL_TOKEN }}
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
